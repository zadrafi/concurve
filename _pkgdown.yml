reference:
- contents:
  - concurve-package
- title: Statistical Computations
  desc: Compute consonance and surprisal distributions for a wide range of scenarios, 
        along with likelihood functions.
- contents:
  - curve_boot
  - curve_corr
  - curve_lik
  - curve_lmer
  - curve_mean
  - curve_meta
  - curve_model
  - curve_rev
  - curve_surv
  - curve_wrap
  - curve_from_ratio
  - curve_from_se
- title: Database Integration
  desc: Connect to databases and construct consonance functions from query results.
- contents:
  - curve_snowflake
  - curve_snowflake_batch
- title: Statistical Graphics
  desc: Plot the overall functions that were computed such as the consonance, 
        surprisal, and likelihood functions.
- contents:
  - ggcurve
  - curve_compare
  - plot_compare
  - curve_overlap
  - plot_multi
- title: Statistical Reporting
  desc: Display the tables showing relevant statistics from the initial computations.
- contents:
  - curve_table
  - curve_summary
- title: Data Export
  desc: Export consonance data to other tools and formats.
- contents:
  - export_for_powerbi
- title: Miscellaneous Functions
  desc: Some internal helper functions.
- contents:
  - RobustMin
  - RobustMax

pkgdown:
  as_is: true
  extension: pdf

toc:
  depth: 5
  toc_float: true
